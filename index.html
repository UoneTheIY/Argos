<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Uone IA Chat</title>
    <style>
        body { font-family: sans-serif; background: #121212; color: white; display: flex; flex-direction: column; height: 100vh; margin: 0; }
        #chat-box { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 10px; }
        .msg { padding: 12px; border-radius: 8px; max-width: 85%; word-wrap: break-word; }
        .user { background: #34495e; align-self: flex-end; }
        .ia { background: #1e272e; align-self: flex-start; border: 1px solid #27ae60; }
        .input-area { padding: 20px; background: #1e1e1e; display: flex; gap: 10px; border-top: 1px solid #333; }
        input { flex: 1; padding: 12px; border-radius: 5px; border: none; background: #2c3e50; color: white; outline: none; }
        button { padding: 10px 20px; background: #27ae60; color: white; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

    <div id="chat-box">
        <div class="msg ia">IA pronta. Pode mandar sua mensagem!</div>
    </div>

    <div class="input-area">
        <input type="text" id="user-input" placeholder="Digite aqui...">
        <button onclick="window.enviarMensagem()">Enviar</button>
    </div>

    <script>
        // Definimos direto no objeto 'window' para o botão sempre encontrar
        window.enviarMensagem = async function() {
            const API_KEY = "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"; // <--- COLOQUE A CHAVE NOVA AQUI
            const input = document.getElementById('user-input');
            const chatBox = document.getElementById('chat-box');
            
            if (!input.value.trim()) return;

            const textoUser = input.value;
            input.value = "";

            // Mostra mensagem do usuário
            const userDiv = document.createElement('div');
            userDiv.className = 'msg user';
            userDiv.innerText = textoUser;
            chatBox.appendChild(userDiv);

            try {
                const response = await fetch("https://corsproxy.io/?https://api.groq.com/openai/v1/chat/completions", {
                    method: "POST",
                    headers: {
                        "Authorization": `Bearer ${API_KEY}`,
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({
                        model: "llama-3.1-8b-instant",
                        messages: [{ role: "user", content: textoUser }]
                    })
                });

                const data = await response.json();
                
                const iaDiv = document.createElement('div');
                iaDiv.className = 'msg ia';
                iaDiv.innerText = data.choices[0].message.content;
                chatBox.appendChild(iaDiv);
                
                chatBox.scrollTop = chatBox.scrollHeight;

            } catch (e) {
                console.error(e);
                alert("Erro ao conectar. Verifique se a chave é válida.");
            }
        };
    </script>
</body>
</html>
