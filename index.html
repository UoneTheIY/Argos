<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Argos</title>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="config.js"></script>
    <style>
        :root { --bg: #0d1117; --accent: #238636; --text: #c9d1d9; }
        body { background: var(--bg); color: var(--text); font-family: sans-serif; margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        
        header { padding: 10px 15px; background: #161b22; border-bottom: 1px solid #333; font-weight: bold; color: var(--accent); }

        #chat { flex: 1; overflow-y: auto; padding: 10px; display: flex; flex-direction: column; gap: 8px; }
        
        .msg { padding: 8px 12px; border-radius: 12px; max-width: 75%; font-size: 13px; line-height: 1.4; animation: fIn 0.2s ease; }
        @keyframes fIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }

        .user { align-self: flex-end; background: var(--accent); color: white; border-bottom-right-radius: 2px; }
        .ai { align-self: flex-start; background: #21262d; border: 1px solid #333; border-bottom-left-radius: 2px; }

        #input-area { padding: 10px; background: #161b22; display: flex; gap: 8px; border-top: 1px solid #333; }
        input { flex: 1; padding: 10px 15px; border-radius: 20px; border: 1px solid #333; background: #0d1117; color: white; outline: none; font-size: 14px; }
        button { background: var(--accent); color: white; border: none; padding: 8px 18px; border-radius: 20px; font-weight: bold; cursor: pointer; }
        button:disabled { opacity: 0.5; cursor: not-allowed; }
        pre { background: #000; padding: 8px; border-radius: 6px; overflow-x: auto; font-size: 11px; }
    </style>
</head>
<body>

    <header>Argos (Ai)</header>

    <div id="chat"></div>

    <div id="input-area">
        <input type="text" id="user-input" placeholder="Pergunte ao Argos..." autocomplete="off">
        <button id="btn" onclick="enviar()">Enviar</button>
    </div>

    <script>
        const chatDiv = document.getElementById('chat');
        const input = document.getElementById('user-input');
        const btn = document.getElementById('btn');

        // Carregar histórico inicial
        function loadHistory() {
            historico.forEach(m => {
                if(m.role !== 'system') add(m.content, m.role === 'user' ? 'user' : 'ai');
            });
            chatDiv.scrollTop = chatDiv.scrollHeight;
        }

        async function enviar() {
            const texto = input.value.trim();
            if(!texto || btn.disabled) return;

            // 1. Mostrar texto do usuário
            add(texto, 'user');
            input.value = '';
            btn.disabled = true;
            
            // 2. Criar balão de carregamento
            const msgIA = add('...', 'ai');
            
            // 3. Chamar a função do config.js
            try {
                const resposta = await chamarIA(texto);
                msgIA.innerHTML = marked.parse(resposta);
            } catch (e) {
                msgIA.innerText = "Erro ao processar.";
            } finally {
                btn.disabled = false;
                chatDiv.scrollTop = chatDiv.scrollHeight;
            }
        }

        function add(txt, tipo) {
            const div = document.createElement('div');
            div.className = `msg ${tipo}`;
            div.innerHTML = (tipo === 'ai' || tipo === 'assistant') ? marked.parse(txt) : txt;
            chatDiv.appendChild(div);
            chatDiv.scrollTop = chatDiv.scrollHeight;
            return div;
        }

        input.addEventListener("keypress", (e) => { if(e.key === "Enter") enviar(); });
        
        // Inicializa o chat
        window.onload = loadHistory;
    </script>
</body>
</html>

</html>
