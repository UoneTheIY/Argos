<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A.M</title>
    <style>
        :root {
            --bg: #0a0a0a;
            --panel: #161616;
            --accent: #00ffcc;
            --text: #e0e0e0;
            --user-msg: #1e3a8a;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        /* Header */
        header {
            background: var(--panel);
            padding: 15px;
            text-align: center;
            border-bottom: 2px solid var(--accent);
            box-shadow: 0 4px 15px rgba(0, 255, 204, 0.1);
        }

        h1 { margin: 0; font-size: 1.5rem; letter-spacing: 2px; color: var(--accent); }

        /* Área de Chat */
        #chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .message {
            max-width: 80%;
            padding: 12px 16px;
            border-radius: 10px;
            line-height: 1.5;
            word-wrap: break-word;
        }

        .user-message {
            align-self: flex-end;
            background-color: var(--user-msg);
            border-bottom-right-radius: 2px;
        }

        .am-message {
            align-self: flex-start;
            background-color: var(--panel);
            border-left: 4px solid var(--accent);
            border-bottom-left-radius: 2px;
        }

        /* Área de Input */
        .input-area {
            background: var(--panel);
            padding: 20px;
            display: flex;
            gap: 10px;
        }

        input {
            flex: 1;
            background: #222;
            border: 1px solid #444;
            padding: 12px;
            color: white;
            border-radius: 5px;
            outline: none;
        }

        input:focus { border-color: var(--accent); }

        button {
            background: var(--accent);
            color: black;
            border: none;
            padding: 0 20px;
            border-radius: 5px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover { opacity: 0.8; transform: translateY(-2px); }

        /* Scrollbar customizada */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: var(--accent); border-radius: 10px; }
    </style>
</head>
<body>

<header>
    <h1>A.M</h1>
</header>

<div id="chat-container">
    <div class="message am-message">Olá! Eu sou A.M. Como posso ajudar hoje?</div>
</div>

<div class="input-area">
    <input type="text" id="userInput" placeholder="Pergunta á A.M." onkeypress="handleKeyPress(event)">
    <button onclick="sendMessage()">Send</button>
</div>

<script>
    // --- CONFIGURAÇÃO ---
    const GROQ_API_KEY = "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"; // <--- COLOQUE SUA CHAVE AQUI
    
    // MEMÓRIA DE CONTEXTO
    let messages = [
        { role: "system", content: "Você é a A.M. (Advanced Machine), uma inteligência artificial de elite. Suas respostas devem ser precisas, lógicas e eficientes." }
    ];

    async function sendMessage() {
        const inputField = document.getElementById('userInput');
        const chatContainer = document.getElementById('chat-container');
        const text = inputField.value.trim();

        if (!text) return;

        // 1. Mostrar mensagem do usuário na tela
        appendMessage('user', text);
        inputField.value = '';

        // 2. Adicionar ao histórico (Memória)
        messages.push({ role: "user", content: text });

        try {
            // 3. Chamada direta para a API do Groq
            const response = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                method: "POST",
                headers: {
                    "Authorization": `Bearer ${GROQ_API_KEY}`,
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({
                    model: "llama-3.3-70b-versatile",
                    messages: messages,
                    temperature: 0.7
                })
            });

            const data = await response.json();
            const amResponse = data.choices[0].message.content;

            // 4. Mostrar resposta da A.M. e salvar na memória
            appendMessage('am', amResponse);
            messages.push({ role: "assistant", content: amResponse });

        } catch (error) {
            appendMessage('am', "ERRO CRÍTICO: Falha na conexão com o núcleo Groq.");
            console.error(error);
        }
    }

    function appendMessage(role, text) {
        const chatContainer = document.getElementById('chat-container');
        const msgDiv = document.createElement('div');
        msgDiv.className = `message ${role === 'user' ? 'user-message' : 'am-message'}`;
        msgDiv.innerText = text;
        chatContainer.appendChild(msgDiv);
        chatContainer.scrollTop = chatContainer.scrollHeight;
    }

    function handleKeyPress(e) {
        if (e.key === 'Enter') sendMessage();
    }
</script>

</body>
</html>
