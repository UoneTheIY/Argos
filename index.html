<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Argos Ai</title>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        :root { 
            --bg: #0d1117; 
            --accent: #238636; 
            --text: #c9d1d9; 
            --bubble-ai: #21262d;
            --border: #30363d;
        }
        
        body { 
            background: var(--bg); 
            color: var(--text); 
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; 
            margin: 0; 
            display: flex; 
            flex-direction: column; 
            height: 100vh; 
            height: -webkit-fill-available;
            overflow: hidden;
        }
        
        header { 
            padding: 15px 20px; 
            background: #161b22; 
            border-bottom: 1px solid var(--border); 
            font-weight: bold; 
            color: var(--accent);
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-shrink: 0;
        }

        #chat { 
            flex: 1; 
            overflow-y: auto; 
            padding: 15px; 
            display: flex; 
            flex-direction: column; 
            gap: 12px; 
        }
        
        .msg { 
            padding: 10px 14px; 
            border-radius: 18px; 
            max-width: 85%; 
            line-height: 1.5; 
            font-size: 14px; 
            word-wrap: break-word;
            animation: fadeIn 0.2s ease-out;
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
        
        .user { 
            align-self: flex-end; 
            background: var(--accent); 
            color: white; 
            border-bottom-right-radius: 4px; 
        }
        
        .ai { 
            align-self: flex-start; 
            background: var(--bubble-ai); 
            border: 1px solid var(--border); 
            border-bottom-left-radius: 4px; 
        }

        /* Prevent code blocks from breaking the layout */
        pre { background: #000; padding: 10px; border-radius: 8px; overflow-x: auto; max-width: 100%; }
        code { font-family: 'Cascadia Code', monospace; font-size: 12px; }

        #input-area { 
            padding: 12px 15px; 
            background: #161b22; 
            display: flex; 
            gap: 10px; 
            border-top: 1px solid var(--border); 
            flex-shrink: 0;
        }
        
        input { 
            flex: 1; 
            padding: 12px 18px; 
            border-radius: 25px; 
            border: 1px solid var(--border); 
            background: #0d1117; 
            color: white; 
            outline: none; 
            font-size: 16px; /* Prevents iOS zoom on focus */
        }
        
        #btn-enviar {
            background: none;
            border: none;
            cursor: pointer;
            padding: 5px;
            display: flex;
            align-items: center;
            transition: transform 0.1s;
        }

        #btn-enviar:active { transform: scale(0.9); }
        #btn-enviar img { width: 28px; height: 28px; filter: invert(1); }
        #btn-enviar:disabled { opacity: 0.3; }
    </style>
</head>
<body>

    <header>
        <span>Argos Ai</span>
        <span style="font-size: 11px; font-weight: normal; color: #8b949e;">Llama 3.3</span>
    </header>

    <div id="chat"></div>

    <div id="input-area">
        <input type="text" id="user-input" placeholder="Pergunte ao Argos..." autocomplete="off">
        <button id="btn-enviar">
            <img src="https://cdn-icons-png.flaticon.com/512/3106/3106791.png" alt="Enviar">
        </button>
    </div>

    <script>
        const CONFIG = {
            API_KEY: "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",
            MODELO: "llama-3.3-70b-versatile",
            SYSTEM_PROMPT: "Seu nome é Argos. Você é uma IA de elite, rápida e lógica."
        };

        let historico = JSON.parse(localStorage.getItem('argos_v2_data')) || [
            { role: "system", content: CONFIG.SYSTEM_PROMPT }
        ];

        const chatDiv = document.getElementById('chat');
        const input = document.getElementById('user-input');
        const btn = document.getElementById('btn-enviar');

        function init() {
            chatDiv.innerHTML = '';
            historico.forEach(m => {
                if(m.role !== 'system') add(m.content, m.role === 'user' ? 'user' : 'ai');
            });
            scrollToBottom();
        }

        async function enviar() {
            const texto = input.value.trim();
            if(!texto || btn.disabled) return;

            add(texto, 'user');
            historico.push({ role: "user", content: texto });
            input.value = '';
            btn.disabled = true;
            
            const msgIA = add('...', 'ai');
            
            try {
                const res = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                    method: "POST",
                    headers: {
                        "Authorization": `Bearer ${CONFIG.API_KEY}`,
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({
                        model: CONFIG.MODELO,
                        messages: historico,
                        temperature: 0.6
                    })
                });

                const data = await res.json();
                const resposta = data.choices[0].message.content;
                
                msgIA.innerHTML = marked.parse(resposta);
                historico.push({ role: "assistant", content: resposta });
                
                // Limit history to save space
                if (historico.length > 20) historico.splice(1, 2);
                localStorage.setItem('argos_v2_data', JSON.stringify(historico));

            } catch (e) {
                msgIA.innerText = "Erro na conexão.";
            } finally {
                btn.disabled = false;
                scrollToBottom();
            }
        }

        function add(txt, tipo) {
            const div = document.createElement('div');
            div.className = `msg ${tipo}`;
            
            if (tipo === 'user') {
                div.textContent = txt; 
            } else {
                // If it's the loading "...", just show text. Otherwise, parse Markdown.
                div.innerHTML = (txt === '...') ? txt : marked.parse(txt);
            }
            
            chatDiv.appendChild(div);
            scrollToBottom();
            return div;
        }

        function scrollToBottom() {
            chatDiv.scrollTop = chatDiv.scrollHeight;
        }

        btn.addEventListener("click", enviar);
        input.addEventListener("keypress", (e) => { if(e.key === "Enter") enviar(); });

        window.onload = init;
    </script>
</body>
</html>
