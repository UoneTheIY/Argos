<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IA Chat - Groq Llama 3.1</title>
    <style>
        body { font-family: sans-serif; background: #121212; color: white; display: flex; flex-direction: column; height: 100vh; margin: 0; }
        #chat-box { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 10px; }
        .msg { padding: 12px; border-radius: 8px; max-width: 85%; line-height: 1.4; word-wrap: break-word; }
        .user { background: #34495e; align-self: flex-end; border-bottom-right-radius: 2px; }
        .ia { background: #1e272e; align-self: flex-start; border: 1px solid #27ae60; border-bottom-left-radius: 2px; }
        .input-area { padding: 20px; background: #1e1e1e; display: flex; gap: 10px; border-top: 1px solid #333; }
        input { flex: 1; padding: 12px; border-radius: 5px; border: none; outline: none; background: #2c3e50; color: white; }
        button { padding: 10px 20px; background: #27ae60; color: white; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; }
        button:active { background: #219150; }
    </style>
</head>
<body>

    <div id="chat-box">
        <div class="msg ia">Conexão estabelecida! Como posso ajudar com seus scripts ou projetos agora?</div>
    </div>

    <div class="input-area">
        <input type="text" id="user-input" placeholder="Digite sua mensagem..." onkeypress="if(event.key==='Enter') enviarMensagem()">
        <button onclick="enviarMensagem()">Enviar</button>
    </div>

    <script>
        // Substitua pela sua chave nova e válida do Groq
        const API_KEY = "input-area:"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"; 
        const URL_PROXY = "https://corsproxy.io/?https://api.groq.com/openai/v1/chat/completions";

        async function enviarMensagem() {
            const input = document.getElementById('user-input');
            const chatBox = document.getElementById('chat-box');
            const texto = input.value.trim();
            
            if (!texto) return;

            // 1. Adiciona mensagem do usuário na tela
            adicionarMensagem(texto, 'user');
            input.value = '';

            try {
                // 2. Faz a chamada para a API via Proxy
                const response = await fetch(URL_PROXY, {
                    method: "POST",
                    headers: {
                        "Authorization": `Bearer ${API_KEY}`,
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({
                        model: "llama-3.1-8b-instant",
                        messages: [{ role: "user", content: texto }],
                        temperature: 0.7
                    })
                });

                const data = await response.json();

                if (data.choices && data.choices[0]) {
                    const respostaIA = data.choices[0].message.content;
                    adicionarMensagem(respostaIA, 'ia');
                } else if (data.error) {
                    adicionarMensagem("Erro na API: " + data.error.message, 'ia');
                }
            } catch (error) {
                console.error(error);
                adicionarMensagem("Erro de conexão. Verifique se a chave é válida ou o limite do Groq.", 'ia');
            }
        }

        function adicionarMensagem(texto, tipo) {
            const chatBox = document.getElementById('chat-box');
            const div = document.createElement('div');
            div.className = `msg ${tipo}`;
            div.innerText = texto;
            chatBox.appendChild(div);
            
            // Scroll automático para a última mensagem
            chatBox.scrollTop = chatBox.scrollHeight;
        }
    </script>
</body>
</html>
