<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>A.M.</title>
    <style>
        body {
            background-color: #1a1a1a;
            color: #ccc;
            font-family: sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
            height: -webkit-fill-available;
        }
        #chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 15px;
            display: flex;
            flex-direction: column;
        }
        .message {
            margin-bottom: 15px;
            padding: 12px;
            border-radius: 8px;
            font-size: 15px;
            line-height: 1.4;
            max-width: 85%;
            word-wrap: break-word;
            display: inline-block; /* Resolve o bug do balão pequeno */
        }
        .am-message {
            align-self: flex-start;
            background-color: #2a2a2a;
            border: 1px solid #444;
            color: #eee;
        }
        .user-message {
            align-self: flex-end;
            background-color: #3d3d3d;
            border: 1px solid #555;
            color: #fff;
        }
        strong { color: #fff; font-weight: bold; }
        .input-area {
            background: #222;
            padding: 15px;
            display: flex;
            gap: 10px;
            border-top: 1px solid #333;
        }
        input {
            flex: 1;
            background: #111;
            border: 1px solid #444;
            padding: 12px;
            color: #fff;
            border-radius: 4px;
            outline: none;
            font-size: 16px; /* Evita zoom no iPhone */
        }
        button {
            background: #444;
            color: #fff;
            border: none;
            padding: 0 15px;
            border-radius: 4px;
            font-weight: bold;
            cursor: pointer;
        }
        button:disabled { opacity: 0.5; }
    </style>
</head>
<body>

<div id="chat-container">
    <div class="message am-message">Sistemas ativos. <strong>A.M.</strong> pronta.</div>
</div>

<div class="input-area">
    <input type="text" id="userInput" placeholder="Comando...">
    <button id="sendBtn" onclick="sendMessage()">ENVIAR</button>
</div>

<script>
    const GROQ_API_KEY = "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"; 
    let history = [{ role: "system", content: "Você é a A.M., seja direto e use **negrito**." }];

    async function sendMessage() {
        const input = document.getElementById('userInput');
        const btn = document.getElementById('sendBtn');
        const text = input.value.trim();
        if (!text) return;

        input.value = '';
        input.disabled = true;
        btn.disabled = true;

        addMsg('user', text);
        history.push({ role: "user", content: text });

        const amDiv = addMsg('am', "...");

        try {
            const response = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                method: "POST",
                headers: {
                    "Authorization": `Bearer ${GROQ_API_KEY}`,
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({
                    model: "llama-3.3-70b-versatile",
                    messages: history,
                    stream: true
                })
            });

            const reader = response.body.getReader();
            const decoder = new TextDecoder();
            let full = "";
            amDiv.innerHTML = ""; // Limpa os pontos

            while (true) {
                const { done, value } = await reader.read();
                if (done) break;

                const chunk = decoder.decode(value);
                const lines = chunk.split("\n");

                for (const line of lines) {
                    if (line.startsWith("data: ") && line !== "data: [DONE]") {
                        try {
                            const data = JSON.parse(line.substring(6));
                            const content = data.choices[0].delta.content;
                            if (content) {
                                full += content;
                                // Renderização segura
                                amDiv.innerHTML = full.replace(/\*\*(.*?)\*\*/g, "<strong>$1</strong>").replace(/\n/g, "<br>");
                            }
                        } catch (e) {}
                    }
                }
            }
            history.push({ role: "assistant", content: full });
        } catch (err) {
            amDiv.innerHTML = "Erro: Sem conexão.";
        } finally {
            input.disabled = false;
            btn.disabled = false;
            input.focus();
        }
    }

    function addMsg(role, text) {
        const container = document.getElementById('chat-container');
        const div = document.createElement('div');
        div.className = `message ${role}-message`;
        div.innerHTML = text;
        container.appendChild(div);
        container.scrollTop = container.scrollHeight;
        return div;
    }

    document.getElementById('userInput').addEventListener('keypress', (e) => {
        if (e.key === 'Enter') sendMessage();
    });
</script>
</body>
</html>
