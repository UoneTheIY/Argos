<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IA Chat - Groq</title>
    <style>
        body { font-family: sans-serif; background: #121212; color: white; display: flex; flex-direction: column; height: 100vh; margin: 0; }
        #chat-box { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 10px; }
        .msg { padding: 10px; border-radius: 8px; max-width: 80%; }
        .user { background: #34495e; align-self: flex-end; }
        .ia { background: #2c3e50; align-self: flex-start; border: 1px solid #7f8c8d; }
        .input-area { padding: 20px; background: #1e1e1e; display: flex; gap: 10px; }
        input { flex: 1; padding: 12px; border-radius: 5px; border: none; outline: none; }
        button { padding: 10px 20px; background: #27ae60; color: white; border: none; border-radius: 5px; cursor: pointer; }
    </style>
</head>
<body>

    <div id="chat-box">
        <div class="msg ia">Olá! Como posso te ajudar com seus scripts ou projetos hoje?</div>
    </div>

    <div class="input-area">
        <input type="text" id="user-input" placeholder="Digite sua mensagem...">
        <button onclick="enviarMensagem()">Enviar</button>
    </div>

    <script>
        const API_KEY = "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";
        const chatBox = document.getElementById('chat-box');

        async function enviarMensagem() {
            const input = document.getElementById('user-input');
            const texto = input.value.trim();
            
            if (!texto) return;

            // Adiciona mensagem do usuário na tela
            adicionarMensagem(texto, 'user');
            input.value = '';

            try {
                const response = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                    method: "POST",
                    headers: {
                        "Authorization": `Bearer ${API_KEY}`,
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({
                        model: "llama3-8b-8192",
                        messages: [{ role: "user", content: texto }]
                    })
                });

                const data = await response.json();
                const respostaIA = data.choices[0].message.content;
                
                adicionarMensagem(respostaIA, 'ia');
            } catch (error) {
                adicionarMensagem("Erro ao conectar com a IA.", 'ia');
            }
        }

        function adicionarMensagem(texto, tipo) {
            const div = document.createElement('div');
            div.className = `msg ${tipo}`;
            div.innerText = texto;
            chatBox.appendChild(div);
            chatBox.scrollTop = chatBox.scrollHeight;
        }
    </script>
</body>
</html>
