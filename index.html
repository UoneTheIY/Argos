<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Uone AI Compact</title>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="config.js"></script>
    <style>
        :root { 
            --bg: #0d1117; 
            --accent: #238636; 
            --text: #c9d1d9; 
            --bubble-ai: #808080;
        }
        
        body { 
            background: var(--bg); 
            color: var(--text); 
            font-family: 'Segoe UI', sans-serif; 
            margin: 0; 
            display: flex; 
            flex-direction: column; 
            height: 100vh; 
            overflow: hidden;
        }
        
        #chat { 
            flex: 1; 
            overflow-y: auto; 
            padding: 10px; 
            display: flex; 
            flex-direction: column; 
            gap: 6px; 
        }
        
        .msg { 
            padding: 8px 12px; 
            border-radius: 12px; 
            max-width: 72%; /* Bolhas mais estreitas */
            line-height: 1.4; 
            font-size: 13px; /* Fonte compacta */
            word-wrap: break-word;
            animation: fadeIn 0.2s ease;
        }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        
        .user { 
            align-self: flex-end; 
            background: var(--accent); 
            color: white; 
            border-bottom-right-radius: 2px; 
        }
        
        .ai { 
            align-self: flex-start; 
            background: var(--bubble-ai); 
            border: 1px solid #333; 
            border-bottom-left-radius: 2px; 
        }
        
        pre { background: #000; padding: 8px; border-radius: 6px; overflow-x: auto; font-size: 11px; }

        #input-area { 
            padding: 8px 12px; 
            background: #161b22; 
            display: flex; 
            gap: 8px; 
            border-top: 1px solid #333; 
            align-items: center;
        }
        
        input { 
            flex: 1; 
            padding: 8px 14px; 
            border-radius: 20px; 
            border: 1px solid #333; 
            background: #0d1117; 
            color: white; 
            outline: none; 
            font-size: 14px;
        }
        
        button { 
            background: var(--accent); 
            color: white; 
            border: none; 
            padding: 8px 16px; 
            border-radius: 20px; 
            font-weight: bold; 
            font-size: 13px;
            cursor: pointer;
        }

        button:disabled { opacity: 0.5; }
    </style>
</head>
<body>

    <div id="chat"></div>

    <div id="input-area">
        <input type="text" id="user-input" placeholder="Diga algo..." autocomplete="off">
        <button id="btn" onclick="enviar()">Enviar</button>
    </div>

    <script>
        const chatDiv = document.getElementById('chat');
        const input = document.getElementById('user-input');
        const btn = document.getElementById('btn');

        // Renderiza histórico salvo
        historico.forEach(m => {
            if(m.role !== 'system') add(m.content, m.role === 'user' ? 'user' : 'ai');
        });

        async function enviar() {
            const texto = input.value.trim();
            if(!texto || btn.disabled) return;

            add(texto, 'user');
            input.value = '';
            btn.disabled = true;
            
            const msgIA = add('...', 'ai');
            
            const resposta = await chamarIA(texto);
            msgIA.innerHTML = marked.parse(resposta);
            
            btn.disabled = false;
            chatDiv.scrollTop = chatDiv.scrollHeight;
        }

        function add(txt, tipo) {
            const div = document.createElement('div');
            div.className = `msg ${tipo}`;
            div.innerHTML = (tipo === 'ai') ? marked.parse(txt) : txt;
            chatDiv.appendChild(div);
            chatDiv.scrollTop = chatDiv.scrollHeight;
            return div;
        }

        input.addEventListener("keypress", (e) => { if(e.key === "Enter") enviar(); });
    </script>
</body>
</html>
