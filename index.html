<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Argos AI</title>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        * { box-sizing: border-box; }
        
        :root { 
            --bg: #0d1117; 
            --accent: #238636; 
            --text: #c9d1d9; 
            --bubble-ai: #161b22;
            --border: #30363d;
            --danger: #da3633;
        }
        
        /* CORREÇÃO AQUI: Usando dvh para o conteúdo caber na tela do celular */
        body, html { 
            background: var(--bg); 
            color: var(--text); 
            font-family: -apple-system, system-ui, sans-serif; 
            margin: 0; padding: 0; 
            height: 100%; 
            height: 100dvh; 
            overflow: hidden;
        }
        
        .container { 
            display: flex; 
            flex-direction: column; 
            height: 100%; 
            width: 100%;
        }

        header { 
            height: 60px; padding: 0 20px; background: #161b22; 
            border-bottom: 1px solid var(--border); 
            display: flex; align-items: center; justify-content: space-between;
            flex-shrink: 0; z-index: 10;
        }

        header h1 { font-size: 18px; color: var(--accent); margin: 0; }

        .menu-container { position: relative; }
        .btn-menu { 
            background: none; border: none; color: var(--text); 
            font-size: 24px; cursor: pointer; padding: 5px 10px;
        }

        .dropdown {
            position: absolute; right: 0; top: 40px;
            background: #1c2128; border: 1px solid var(--border);
            border-radius: 8px; width: 150px; display: none;
            box-shadow: 0 8px 24px rgba(0,0,0,0.5); z-index: 100;
        }
        .dropdown button {
            width: 100%; padding: 12px; background: none; border: none;
            color: var(--text); text-align: left; cursor: pointer; font-size: 14px;
        }

        /* ÁREA DE CHAT CORRIGIDA */
        #chat { 
            flex: 1; 
            overflow-y: auto; 
            padding: 15px; 
            display: flex; 
            flex-direction: column; 
            gap: 12px; 
            background: var(--bg);
        }
        
        .msg { padding: 12px 16px; border-radius: 15px; max-width: 85%; font-size: 15px; line-height: 1.5; }
        .user { align-self: flex-end; background: var(--accent); color: white; border-bottom-right-radius: 2px; }
        .ai { align-self: flex-start; background: var(--bubble-ai); border: 1px solid var(--border); border-bottom-left-radius: 2px; }

        /* INPUT FIXO NO RODAPÉ */
        #input-area { 
            padding: 10px 15px; 
            background: #161b22; 
            display: flex; 
            gap: 10px; 
            border-top: 1px solid var(--border);
            flex-shrink: 0;
            padding-bottom: env(safe-area-inset-bottom, 15px); /* Ajuste para iPhones novos */
        }
        
        input { flex: 1; padding: 12px 18px; border-radius: 25px; border: 1px solid var(--border); background: #0d1117; color: white; outline: none; font-size: 16px; }
        #btn-enviar img { width: 30px; height: 30px; filter: invert(1); }

        /* MODAL */
        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8); display: none; align-items: center;
            justify-content: center; z-index: 1000;
        }
        .modal {
            background: #1c2128; padding: 20px; border-radius: 12px;
            width: 85%; max-width: 320px; text-align: center; border: 1px solid var(--border);
        }
        .modal-btns { display: flex; gap: 10px; justify-content: center; margin-top: 20px; }
        .modal-btns button { padding: 10px 20px; border-radius: 6px; border: none; cursor: pointer; font-weight: bold; }
        .btn-sim { background: var(--danger); color: white; }
        .btn-nao { background: #30363d; color: var(--text); }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <h1>🤖 ARGOS AI</h1>
            <div class="menu-container">
                <button class="btn-menu" onclick="toggleMenu()">⋮</button>
                <div id="dropdown" class="dropdown">
                    <button onclick="abrirModal()">🗑️ Excluir Chat</button>
                </div>
            </div>
        </header>

        <div id="chat"></div>

        <div id="input-area">
            <input type="text" id="user-input" placeholder="Pergunte ao Argos..." autocomplete="off">
            <button id="btn-enviar" onclick="enviar()" style="background:none; border:none; cursor:pointer;">
                <img src="https://cdn-icons-png.flaticon.com/512/3106/3106791.png" alt="Enviar">
            </button>
        </div>
    </div>

    <div id="modal-confirm" class="modal-overlay">
        <div class="modal">
            <p>Você tem certeza que vai deletar este chat? <br><b style="color:var(--danger)">(Irreversível)</b></p>
            <div class="modal-btns">
                <button class="btn-nao" onclick="fecharModal()">Não</button>
                <button class="btn-sim" onclick="deletarChat()">Sim</button>
            </div>
        </div>
    </div>

    <script>
        const CONFIG = {
            API_KEY: "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",
            MODELO: "llama-3.3-70b-versatile",
            SYSTEM_PROMPT: "Seu nome é Argos. Você é uma IA de elite, rápida e lógica."
        };

        let historico = JSON.parse(localStorage.getItem('argos_v4')) || [{ role: "system", content: CONFIG.SYSTEM_PROMPT }];

        const chatDiv = document.getElementById('chat');
        const input = document.getElementById('user-input');
        const dropdown = document.getElementById('dropdown');
        const modal = document.getElementById('modal-confirm');

        function init() {
            chatDiv.innerHTML = '';
            historico.forEach(m => { if(m.role !== 'system') renderMsg(m.content, m.role === 'user' ? 'user' : 'ai'); });
            scrollChat();
        }

        function toggleMenu() { dropdown.style.display = dropdown.style.display === 'block' ? 'none' : 'block'; }
        function abrirModal() { modal.style.display = 'flex'; dropdown.style.display = 'none'; }
        function fecharModal() { modal.style.display = 'none'; }
        function deletarChat() { localStorage.removeItem('argos_v4'); historico = [{ role: "system", content: CONFIG.SYSTEM_PROMPT }]; init(); fecharModal(); }

        async function enviar() {
            const texto = input.value.trim();
            if(!texto) return;

            renderMsg(texto, 'user');
            historico.push({ role: "user", content: texto });
            input.value = '';
            
            const msgIA = renderMsg('...', 'ai');
            
            try {
                const res = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                    method: "POST",
                    headers: { "Authorization": `Bearer ${CONFIG.API_KEY}`, "Content-Type": "application/json" },
                    body: JSON.stringify({ model: CONFIG.MODELO, messages: historico })
                });

                const data = await res.json();
                const resposta = data.choices[0].message.content;
                
                msgIA.innerHTML = marked.parse(resposta);
                historico.push({ role: "assistant", content: resposta });
                localStorage.setItem('argos_v4', JSON.stringify(historico));
            } catch (e) {
                msgIA.innerText = "Erro na conexão.";
            }
            scrollChat();
        }

        function renderMsg(txt, tipo) {
            const div = document.createElement('div');
            div.className = `msg ${tipo}`;
            if (tipo === 'user') div.textContent = txt;
            else div.innerHTML = (txt === '...') ? txt : marked.parse(txt);
            chatDiv.appendChild(div);
            scrollChat();
            return div;
        }

        function scrollChat() { chatDiv.scrollTop = chatDiv.scrollHeight; }

        input.addEventListener("keypress", (e) => { if(e.key === "Enter") enviar(); });
        window.onclick = (e) => { if (!e.target.matches('.btn-menu')) dropdown.style.display = 'none'; };
        window.onload = init;
    </script>
</body>
</html>
