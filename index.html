<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Argos Ai</title>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        * { box-sizing: border-box; }
        
        :root { 
            --bg: #0d1117; 
            --accent: #238636; 
            --text: #c9d1d9; 
            --bubble-ai: #161b22;
            --border: #30363d;
        }
        
        body, html { 
            background: var(--bg); 
            color: var(--text); 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif; 
            margin: 0; 
            padding: 0;
            height: 100%;
            overflow: hidden;
        }
        
        .container {
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        header { 
            height: 60px;
            padding: 0 20px; 
            background: #161b22; 
            border-bottom: 1px solid var(--border); 
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-shrink: 0;
            z-index: 10;
        }

        header h1 { font-size: 18px; color: var(--accent); margin: 0; }
        header span { font-size: 12px; opacity: 0.6; }

        #chat { 
            flex: 1; 
            overflow-y: auto; 
            padding: 15px; 
            display: flex; 
            flex-direction: column; 
            gap: 12px;
            background: var(--bg);
        }
        
        .msg { 
            padding: 12px 16px; 
            border-radius: 15px; 
            max-width: 85%; 
            line-height: 1.5; 
            font-size: 15px; 
            word-wrap: break-word;
        }
        
        .user { 
            align-self: flex-end; 
            background: var(--accent); 
            color: white; 
            border-bottom-right-radius: 2px; 
        }
        
        .ai { 
            align-self: flex-start; 
            background: var(--bubble-ai); 
            border: 1px solid var(--border); 
            border-bottom-left-radius: 2px; 
        }

        pre { background: #000; padding: 10px; border-radius: 8px; overflow-x: auto; max-width: 100%; }

        #input-area { 
            padding: 15px; 
            background: #161b22; 
            display: flex; 
            gap: 10px; 
            border-top: 1px solid var(--border); 
            flex-shrink: 0;
        }
        
        input { 
            flex: 1; 
            padding: 12px 18px; 
            border-radius: 25px; 
            border: 1px solid var(--border); 
            background: #0d1117; 
            color: white; 
            outline: none; 
            font-size: 16px;
        }
        
        #btn-enviar {
            background: none;
            border: none;
            cursor: pointer;
            padding: 0;
            display: flex;
            align-items: center;
        }

        #btn-enviar img { width: 30px; height: 30px; filter: invert(1); }
        #btn-enviar:disabled { opacity: 0.3; }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <h1>Argos Ai</h1></h1>
            <span>Llama 3.3</span>
        </header>

        <div id="chat"></div>

        <div id="input-area">
            <input type="text" id="user-input" placeholder="Pergunte ao Argos..." autocomplete="off">
            <button id="btn-enviar">
                <img src="https://cdn-icons-png.flaticon.com/512/3106/3106791.png" alt="Enviar">
            </button>
        </div>
    </div>

    <script>
        const CONFIG = {
            API_KEY: "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",
            MODELO: "llama-3.3-70b-versatile",
            SYSTEM_PROMPT: "Seu nome é Argos. Você é uma IA de elite, rápida e lógica."
        };

        let historico = JSON.parse(localStorage.getItem('argos_v3')) || [
            { role: "system", content: CONFIG.SYSTEM_PROMPT }
        ];

        const chatDiv = document.getElementById('chat');
        const input = document.getElementById('user-input');
        const btn = document.getElementById('btn-enviar');

        function init() {
            historico.forEach(m => {
                if(m.role !== 'system') renderMsg(m.content, m.role === 'user' ? 'user' : 'ai');
            });
            scrollChat();
        }

        async function enviar() {
            const texto = input.value.trim();
            if(!texto || btn.disabled) return;

            renderMsg(texto, 'user');
            historico.push({ role: "user", content: texto });
            input.value = '';
            btn.disabled = true;
            
            const msgIA = renderMsg('...', 'ai');
            
            try {
                const res = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                    method: "POST",
                    headers: {
                        "Authorization": `Bearer ${CONFIG.API_KEY}`,
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({
                        model: CONFIG.MODELO,
                        messages: historico,
                        temperature: 0.6
                    })
                });

                const data = await res.json();
                const resposta = data.choices[0].message.content;
                
                msgIA.innerHTML = marked.parse(resposta);
                historico.push({ role: "assistant", content: resposta });
                
                if (historico.length > 20) historico.splice(1, 2);
                localStorage.setItem('argos_v3', JSON.stringify(historico));

            } catch (e) {
                msgIA.innerText = "Erro ao conectar.";
            } finally {
                btn.disabled = false;
                scrollChat();
            }
        }

        function renderMsg(txt, tipo) {
            const div = document.createElement('div');
            div.className = `msg ${tipo}`;
            div.innerHTML = (tipo === 'ai' && txt !== '...') ? marked.parse(txt) : txt;
            if (tipo === 'user') div.textContent = txt; 
            
            chatDiv.appendChild(div);
            scrollChat();
            return div;
        }

        function scrollChat() {
            chatDiv.scrollTop = chatDiv.scrollHeight;
        }

        btn.addEventListener("click", enviar);
        input.addEventListener("keypress", (e) => { if(e.key === "Enter") enviar(); });

        window.onload = init;
    </script>
</body>
</html>
