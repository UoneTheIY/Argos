<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Argos AI</title>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        :root { --bg: #0d1117; --accent: #238636; --text: #c9d1d9; --bubble-ai: #161b22; --border: #30363d; --danger: #da3633; }
        body, html { background: var(--bg); color: var(--text); font-family: -apple-system, system-ui, sans-serif; margin: 0; padding: 0; height: 100dvh; overflow: hidden; display: flex; justify-content: center; }
        .container { display: flex; flex-direction: column; height: 100%; width: 100%; max-width: 500px; background: var(--bg); position: relative; }
        header { height: 60px; padding: 0 15px; background: #161b22; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; }
        header h1 { font-size: 17px; color: var(--accent); margin: 0; font-weight: 600; }
        header h1 span { color: #8b949e; font-size: 11px; font-weight: normal; }
        .btn-menu { background: none; border: none; color: #8b949e; font-size: 22px; cursor: pointer; padding: 5px; }
        .dropdown { position: absolute; right: 10px; top: 50px; background: #1c2128; border: 1px solid var(--border); border-radius: 10px; width: 160px; display: none; box-shadow: 0 10px 30px rgba(0,0,0,0.5); z-index: 100; }
        .dropdown button { width: 100%; padding: 14px; background: none; border: none; color: var(--text); text-align: left; cursor: pointer; font-size: 14px; }
        #chat { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 15px; scroll-behavior: smooth; }
        #empty-state { position: absolute; top: 45%; left: 50%; transform: translate(-50%, -50%); text-align: center; width: 80%; pointer-events: none; }
        #empty-state h2 { font-size: 20px; margin: 0; color: white; }
        .msg { padding: 12px 16px; border-radius: 18px; max-width: 85%; font-size: 15px; line-height: 1.5; overflow-wrap: break-word; }
        .user { align-self: flex-end; background: var(--accent); color: white; border-bottom-right-radius: 4px; }
        .ai { align-self: flex-start; background: var(--bubble-ai); border: 1px solid var(--border); border-bottom-left-radius: 4px; }
        #input-area { padding: 12px 15px; background: #161b22; display: flex; gap: 10px; border-top: 1px solid var(--border); padding-bottom: calc(12px + env(safe-area-inset-bottom)); }
        input { flex: 1; padding: 12px 18px; border-radius: 25px; border: 1px solid var(--border); background: #0d1117; color: white; outline: none; font-size: 16px; }
        #btn-enviar { background: none; border: none; color: var(--accent); cursor: pointer; }
        #btn-enviar:disabled { opacity: 0.3; }
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); display: none; align-items: center; justify-content: center; z-index: 1000; }
        .modal { background: #1c2128; padding: 25px; border-radius: 15px; width: 280px; text-align: center; border: 1px solid var(--border); }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <h1>Argos Ai <span>STABLE V2</span></h1>
            <button class="btn-menu" onclick="toggleMenu()">⋮</button>
            <div id="dropdown" class="dropdown">
                <button onclick="abrirModal()">🗑️ Limpar Chat</button>
            </div>
        </header>

        <div id="chat">
            <div id="empty-state"><h2>Como posso ajudar?</h2></div>
        </div>

        <div id="input-area">
            <input type="text" id="user-input" placeholder="Digite aqui..." autocomplete="off">
            <button id="btn-enviar" onclick="enviar()">
                <svg width="28" height="28" viewBox="0 0 24 24" fill="currentColor"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"></path></svg>
            </button>
        </div>
    </div>

    <div id="modal-confirm" class="modal-overlay">
        <div class="modal">
            <p>Apagar conversa?</p>
            <button onclick="deletarChat()" style="background:var(--danger); color:white; border:none; padding:10px 20px; border-radius:5px; cursor:pointer;">Sim, apagar</button>
            <button onclick="fecharModal()" style="background:transparent; color:var(--text); border:none; margin-left:10px; cursor:pointer;">Não</button>
        </div>
    </div>

    <script>
        const CONFIG = {
            API_KEY: "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",
            // Troquei para o modelo 8b que é mais estável para sites estáticos
            MODELO: "llama3-8b-8192", 
            SYSTEM_PROMPT: "Seu nome é Argos, você é uma IA iniciante e criado por Uone, use emojis se necessário."
    
        };

        let historico = JSON.parse(localStorage.getItem('argos_cache')) || [{ role: "system", content: CONFIG.SYSTEM_PROMPT }];

        function toggleMenu() { const d = document.getElementById('dropdown'); d.style.display = d.style.display === 'block' ? 'none' : 'block'; }
        function abrirModal() { document.getElementById('modal-confirm').style.display = 'flex'; toggleMenu(); }
        function fecharModal() { document.getElementById('modal-confirm').style.display = 'none'; }
        function deletarChat() { localStorage.removeItem('argos_cache'); location.reload(); }

        async function enviar() {
            const input = document.getElementById('user-input');
            const btn = document.getElementById('btn-enviar');
            const texto = input.value.trim();
            if(!texto || btn.disabled) return;

            document.getElementById('empty-state').style.display = 'none';
            renderMsg(texto, 'user');
            input.value = '';
            btn.disabled = true;

            const msgIA = renderMsg('...', 'ai');

            try {
                const response = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json",
                        "Authorization": `Bearer ${CONFIG.API_KEY}`
                    },
                    body: JSON.stringify({
                        model: CONFIG.MODELO,
                        messages: [...historico.slice(-6), { role: "user", content: texto }],
                        temperature: 0.6
                    })
                });

                const data = await response.json();
                
                if (data.choices && data.choices[0]) {
                    const resposta = data.choices[0].message.content;
                    msgIA.innerHTML = marked.parse(resposta);
                    historico.push({ role: "user", content: texto }, { role: "assistant", content: resposta });
                    localStorage.setItem('argos_cache', JSON.stringify(historico));
                } else {
                    throw new Error();
                }
            } catch (e) {
                msgIA.innerText = "Erro: Verifique sua chave API ou conexão.";
            } finally {
                btn.disabled = false;
                document.getElementById('chat').scrollTop = document.getElementById('chat').scrollHeight;
            }
        }

        function renderMsg(txt, tipo) {
            const div = document.createElement('div');
            div.className = `msg ${tipo}`;
            div.innerHTML = tipo === 'user' ? txt : marked.parse(txt);
            document.getElementById('chat').appendChild(div);
            document.getElementById('chat').scrollTop = document.getElementById('chat').scrollHeight;
            return div;
        }

        window.onload = () => {
            const msgs = historico.filter(m => m.role !== 'system');
            if(msgs.length > 0) {
                document.getElementById('empty-state').style.display = 'none';
                msgs.forEach(m => renderMsg(m.content, m.role === 'user' ? 'user' : 'ai'));
            }
        };
    </script>
</body>
</html>
