<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A.M. - Advanced Machine</title>
    <style>
        :root {
            --bg: #f5f5f5; /* Branco acinzentado */
            --panel: #ffffff; /* Branco puro */
            --accent: #333333; /* Cinza quase preto para detalhes */
            --text: #222222; /* Texto escuro */
            --user-msg: #e0e0e0; /* Cinza claro para o usuário */
            --am-msg: #ffffff; /* Branco para a IA */
            --border: #cccccc; /* Bordas suaves */
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        /* Cabeçalho Minimalista */
        header {
            background: var(--panel);
            padding: 20px;
            text-align: left;
            border-bottom: 1px solid var(--border);
            z-index: 10;
        }

        h1 { 
            margin: 0; 
            font-size: 0.9rem; 
            letter-spacing: 2px; 
            color: var(--accent); 
            font-weight: 700;
            text-transform: uppercase;
        }

        /* Área de Chat */
        #chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 30px;
            display: flex;
            flex-direction: column;
            gap: 25px;
            scroll-behavior: smooth;
        }

        .message {
            max-width: 75%;
            padding: 18px;
            font-size: 0.95rem;
            line-height: 1.6;
            word-wrap: break-word;
            border: 1px solid transparent;
        }

        .user-message {
            align-self: flex-end;
            background-color: var(--user-msg);
            color: var(--text);
            border-radius: 15px 15px 2px 15px;
        }

        .am-message {
            align-self: flex-start;
            background-color: var(--am-msg);
            color: var(--text);
            border: 1px solid var(--border);
            border-radius: 15px 15px 15px 2px;
        }

        /* Negrito solicitado: agora apenas preto sólido e forte */
        strong {
            color: #000;
            font-weight: 800;
        }

        /* Área de Input */
        .input-area {
            background: var(--panel);
            padding: 25px;
            display: flex;
            gap: 15px;
            border-top: 1px solid var(--border);
        }

        input {
            flex: 1;
            background: #fff;
            border: 1px solid var(--border);
            padding: 12px 15px;
            color: var(--text);
            border-radius: 8px;
            outline: none;
            transition: border 0.2s;
        }

        input:focus { border-color: var(--accent); }

        button {
            background: var(--accent);
            color: #fff;
            border: none;
            padding: 0 30px;
            border-radius: 8px;
            font-size: 0.8rem;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.2s;
            text-transform: uppercase;
        }

        button:hover { opacity: 0.9; }
        button:disabled { background: #ccc; cursor: not-allowed; }

        /* Scrollbar Cinza */
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: #bbb; border-radius: 10px; }
    </style>
</head>
<body>

<header>
    <h1>A.M. Core System <span style="font-weight:300; opacity: 0.5;">| Interface v2.0</span></h1>
</header>

<div id="chat-container">
    <div class="message am-message">Sistemas inicializados. Interface limpa configurada. Aguardando comandos, <strong>A.M.</strong> pronta.</div>
</div>

<div class="input-area">
    <input type="text" id="userInput" placeholder="Escreva aqui..." autocomplete="off" onkeypress="handleKeyPress(event)">
    <button id="sendBtn" onclick="sendMessage()">Enviar</button>
</div>

<script>
    const GROQ_API_KEY = "SUA_CHAVE_AQUI"; 
    
    let messages = [
        { 
            role: "system", 
            content: "Você é a A.M. (Advanced Machine). Responda de forma sóbria, lógica e direta. Use **negrito** para termos técnicos." 
        }
    ];

    async function sendMessage() {
        const inputField = document.getElementById('userInput');
        const sendBtn = document.getElementById('sendBtn');
        const text = inputField.value.trim();

        if (!text) return;

        inputField.value = '';
        inputField.disabled = true;
        sendBtn.disabled = true;

        appendMessageElement('user', text);
        messages.push({ role: "user", content: text });

        const amMsgDiv = appendMessageElement('am', "...");
        amMsgDiv.scrollIntoView({ behavior: 'smooth', block: 'start' });

        try {
            const response = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                method: "POST",
                headers: {
                    "Authorization": `Bearer ${GROQ_API_KEY}`,
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({
                    model: "llama-3.3-70b-versatile",
                    messages: messages,
                    temperature: 0.5,
                    stream: true 
                })
            });

            const reader = response.body.getReader();
            const decoder = new TextDecoder();
            let fullText = "";
            amMsgDiv.innerHTML = "";

            while (true) {
                const { done, value } = await reader.read();
                if (done) break;

                const chunk = decoder.decode(value, { stream: true });
                const lines = chunk.split("\n");

                for (const line of lines) {
                    if (line.startsWith("data: ") && line !== "data: [DONE]") {
                        try {
                            const json = JSON.parse(line.substring(6));
                            const content = json.choices[0].delta.content;
                            if (content) {
                                fullText += content;
                                let formatted = fullText.replace(/\*\*(.*?)\*\*/g, "<strong>$1</strong>");
                                formatted = formatted.replace(/\n/g, "<br>");
                                amMsgDiv.innerHTML = formatted;
                            }
                        } catch (e) {}
                    }
                }
            }
            messages.push({ role: "assistant", content: fullText });
        } catch (error) {
            amMsgDiv.innerHTML = "Erro de conexão.";
        } finally {
            inputField.disabled = false;
            sendBtn.disabled = false;
            inputField.focus();
        }
    }

    function appendMessageElement(role, text) {
        const chatContainer = document.getElementById('chat-container');
        const msgDiv = document.createElement('div');
        msgDiv.className = `message ${role === 'user' ? 'user-message' : 'am-message'}`;
        msgDiv.innerHTML = text; 
        chatContainer.appendChild(msgDiv);
        chatContainer.scrollTop = chatContainer.scrollHeight;
        return msgDiv;
    }

    function handleKeyPress(e) {
        if (e.key === 'Enter') sendMessage();
    }
</script>

</body>
</html>
