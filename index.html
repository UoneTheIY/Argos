<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Uone IA - Filtro de Texto</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #0f0f0f; color: white; display: flex; flex-direction: column; height: 100vh; margin: 0; }
        #chat-box { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 12px; }
        .msg { padding: 12px 16px; border-radius: 12px; max-width: 80%; word-wrap: break-word; line-height: 1.5; }
        .user { background: #2980b9; align-self: flex-end; border-bottom-right-radius: 2px; }
        .ia { background: #1e272e; align-self: flex-start; border: 1px solid #27ae60; border-bottom-left-radius: 2px; }
        
        .input-area { padding: 15px; background: #1a1a1a; display: flex; gap: 10px; border-top: 1px solid #333; }
        input { flex: 1; padding: 12px; border-radius: 8px; border: none; background: #2c3e50; color: white; outline: none; }
        
        button { 
            background: #27ae60; border: none; border-radius: 8px; width: 45px; height: 45px; 
            display: flex; align-items: center; justify-content: center; cursor: pointer;
        }
        button svg { width: 22px; height: 22px; fill: white; }
        
        /* Estilo para destacar o negrito */
        b, strong { color: #f1c40f; font-weight: bold; }
    </style>
</head>
<body>

    <div id="chat-box"></div>

    <div class="input-area">
        <input type="text" id="user-input" placeholder="Diga algo..." onkeypress="if(event.key==='Enter') window.enviarMensagem()">
        <button onclick="window.enviarMensagem()">
            <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"></path></svg>
        </button>
    </div>

    <script>
        const API_KEY = "SUA_CHAVE_AQUI"; 
        const PROXY = "https://corsproxy.io/?";
        const ENDPOINT = "https://api.groq.com/openai/v1/chat/completions";

        let historico = [{ role: "system", content: "Você é o Argos. Quando usar expressões de surpresa, destaque-as." }];

        // FUNÇÃO PARA FORMATAR O TEXTO (Negrito automático)
        function formatarResposta(texto) {
            // 1. Cria uma lista de palavras que você quer que fiquem SEMPRE em negrito
            const palavrasChave = ["meu Deus", "Meu Deus", "caramba", "uau", "Uone"];
            
            let textoFormatado = texto;

            // Substitui cada palavra da lista por ela mesma dentro de <b>
            palavrasChave.forEach(palavra => {
                const regex = new RegExp(palavra, "g");
                textoFormatado = textoFormatado.replace(regex, `<b>${palavra}</b>`);
            });

            // 2. Converte marcações de Markdown **texto** para <b>texto</b>
            textoFormatado = textoFormatado.replace(/\*\*(.*?)\*\*/g, '<b>$1</b>');

            return textoFormatado;
        }

        window.enviarMensagem = async function() {
            const input = document.getElementById('user-input');
            const chatBox = document.getElementById('chat-box');
            const texto = input.value.trim();
            if (!texto) return;
            input.value = "";

            // Usuário
            const userDiv = document.createElement('div');
            userDiv.className = 'msg user';
            userDiv.innerText = texto;
            chatBox.appendChild(userDiv);

            historico.push({ role: "user", content: texto });

            try {
                const response = await fetch(PROXY + ENDPOINT, {
                    method: "POST",
                    headers: { "Authorization": `Bearer ${API_KEY}`, "Content-Type": "application/json" },
                    body: JSON.stringify({ model: "llama-3.1-8b-instant", messages: historico })
                });

                const data = await response.json();
                if (data.choices) {
                    let respostaRaw = data.choices[0].message.content;
                    historico.push({ role: "assistant", content: respostaRaw });

                    // APLICA O FORMATADOR AQUI
                    const iaDiv = document.createElement('div');
                    iaDiv.className = 'msg ia';
                    iaDiv.innerHTML = formatarResposta(respostaRaw); // Usamos innerHTML para aceitar as tags <b>
                    
                    chatBox.appendChild(iaDiv);
                }
            } catch (e) { console.error(e); }
            chatBox.scrollTop = chatBox.scrollHeight;
        };
    </script>
</body>
</html>
