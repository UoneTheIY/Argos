<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Argos</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #0f0f0f; color: white; display: flex; flex-direction: column; height: 100vh; margin: 0; }
        #chat-box { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 12px; }
        .msg { padding: 12px 16px; border-radius: 12px; max-width: 80%; word-wrap: break-word; font-size: 15px; }
        .user { background: #2980b9; align-self: flex-end; border-bottom-right-radius: 2px; }
        .ia { background: #1e272e; align-self: flex-start; border: 1px solid #27ae60; border-bottom-left-radius: 2px; }
        
        .input-area { padding: 15px; background: #1a1a1a; display: flex; gap: 10px; border-top: 1px solid #333; align-items: center; }
        input { flex: 1; padding: 12px; border-radius: 8px; border: none; background: #2c3e50; color: white; outline: none; font-size: 16px; height: 45px; box-sizing: border-box; }
        
        /* BOTÃO COM ÍCONE SVG */
        button { 
            background: #27ae60; 
            border: none; 
            border-radius: 8px; 
            cursor: pointer; 
            width: 45px; 
            height: 45px; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            transition: 0.3s;
            padding: 0;
        }
        
        button svg { width: 24px; height: 24px; fill: white; }
        button:active { transform: scale(0.9); background: #219150; }
    </style>
</head>
<body>

    <div id="chat-box">
        <div class="msg ia">Olá! Sou Argos, um ChatBot iniciante más inteligente e eficiente.</div>
    </div>

    <div class="input-area">
        <input type="text" id="user-input" placeholder="Pergunte ao Argos..." onkeypress="if(event.key==='Enter') window.enviarMensagem()">
        <button onclick="window.enviarMensagem()">
            <svg viewBox="0 0 24 24">
                <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"></path>
            </svg>
        </button>
    </div>

    <script>
        // Use sua chave válida aqui
        const API_KEY = "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"; 
        const PROXY = "https://corsproxy.io/?";
        const ENDPOINT = "https://api.groq.com/openai/v1/chat/completions";

        let historico = [
            { role: "system", content: "Seu nome é Argos, uma IA criada por Uone. Seja prestativo por mais que seja uma IA iniciante." }
        ];

        window.enviarMensagem = async function() {
            const input = document.getElementById('user-input');
            const chatBox = document.getElementById('chat-box');
            const texto = input.value.trim();
            
            if (!texto) return;
            input.value = "";

            // Mensagem do Usuário
            const userDiv = document.createElement('div');
            userDiv.className = 'msg user';
            userDiv.innerText = texto;
            chatBox.appendChild(userDiv);
            chatBox.scrollTop = chatBox.scrollHeight;

            historico.push({ role: "user", content: texto });

            try {
                const response = await fetch(PROXY + ENDPOINT, {
                    method: "POST",
                    headers: {
                        "Authorization": `Bearer ${API_KEY}`,
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({
                        model: "llama-3.1-8b-instant",
                        messages: historico
                    })
                });

                const data = await response.json();

                if (data.choices && data.choices.length > 0) {
                    const respostaIA = data.choices[0].message.content;
                    historico.push({ role: "assistant", content: respostaIA });

                    const iaDiv = document.createElement('div');
                    iaDiv.className = 'msg ia';
                    iaDiv.innerText = respostaIA;
                    chatBox.appendChild(iaDiv);
                }
            } catch (e) {
                console.error(e);
            }
            chatBox.scrollTop = chatBox.scrollHeight;
        };
    </script>
</body>
</html>
