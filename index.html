<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A.M. - Advanced Machine</title>
    <style>
        :root {
            --bg: #2b2b2b; /* Fundo cinza escuro */
            --panel: #333333; /* Painéis cinza */
            --accent: #ffffff; /* Detalhes em branco */
            --text: #e0e0e0; /* Texto claro */
            --user-msg: #444444; /* Balão usuário cinza médio */
            --am-msg: #3d3d3d; /* Balão A.M. cinza sutil */
            --border: #555555;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        header {
            background: var(--panel);
            padding: 15px;
            border-bottom: 1px solid var(--border);
        }

        header h1 { 
            margin: 0; font-size: 0.8rem; letter-spacing: 2px; color: #bbb;
        }

        #chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 15px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .message {
            max-width: 85%;
            padding: 12px 16px;
            border-radius: 10px;
            font-size: 0.95rem;
            line-height: 1.5;
            word-wrap: break-word;
            min-height: 20px; /* Resolve o bug do balão sumindo */
        }

        .user-message {
            align-self: flex-end;
            background-color: var(--user-msg);
            color: #fff;
            border: 1px solid var(--border);
        }

        .am-message {
            align-self: flex-start;
            background-color: var(--am-msg);
            color: #fff;
            border: 1px solid var(--border);
        }

        strong { color: #fff; font-weight: bold; }

        .input-area {
            background: var(--panel);
            padding: 15px;
            display: flex;
            align-items: center;
            gap: 10px;
            border-top: 1px solid var(--border);
        }

        input {
            flex: 1;
            background: #222;
            border: 1px solid var(--border);
            padding: 12px;
            color: #fff;
            border-radius: 5px;
            outline: none;
            min-width: 0; /* Evita que o input empurre o botão para fora */
        }

        button {
            background: #555;
            color: #fff;
            border: none;
            padding: 12px 20px;
            border-radius: 5px;
            font-weight: bold;
            cursor: pointer;
            text-transform: uppercase;
            font-size: 0.75rem;
        }

        button:disabled { opacity: 0.3; }
    </style>
</head>
<body>

<header>
    <h1>A.M. CORE SYSTEM // V2.0</h1>
</header>

<div id="chat-container">
    <div class="message am-message">Sistemas carregados. <strong>A.M.</strong> online.</div>
</div>

<div class="input-area">
    <input type="text" id="userInput" placeholder="Comando..." autocomplete="off">
    <button id="sendBtn" onclick="sendMessage()">Enviar</button>
</div>

<script>
    const GROQ_API_KEY = "SUA_CHAVE_AQUI"; 
    let messages = [{ role: "system", content: "Você é a A.M., uma IA lógica. Use **negrito**." }];

    async function sendMessage() {
        const inputField = document.getElementById('userInput');
        const sendBtn = document.getElementById('sendBtn');
        const text = inputField.value.trim();

        if (!text) return;

        inputField.value = '';
        inputField.disabled = true;
        sendBtn.disabled = true;

        appendMsg('user', text);
        messages.push({ role: "user", content: text });

        const amMsgDiv = appendMsg('am', "...");
        
        try {
            const response = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                method: "POST",
                headers: {
                    "Authorization": `Bearer ${GROQ_API_KEY}`,
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({
                    model: "llama-3.3-70b-versatile",
                    messages: messages,
                    temperature: 0.5,
                    stream: true 
                })
            });

            const reader = response.body.getReader();
            const decoder = new TextDecoder();
            let fullText = "";
            amMsgDiv.innerHTML = "";

            while (true) {
                const { done, value } = await reader.read();
                if (done) break;

                const chunk = decoder.decode(value);
                const lines = chunk.split("\n");

                for (const line of lines) {
                    if (line.startsWith("data: ") && line !== "data: [DONE]") {
                        try {
                            const json = JSON.parse(line.substring(6));
                            const content = json.choices[0]?.delta?.content;
                            if (content) {
                                fullText += content;
                                let formatted = fullText.replace(/\*\*(.*?)\*\*/g, "<strong>$1</strong>");
                                formatted = formatted.replace(/\n/g, "<br>");
                                amMsgDiv.innerHTML = formatted;
                            }
                        } catch (e) {}
                    }
                }
            }
            messages.push({ role: "assistant", content: fullText });
        } catch (error) {
            amMsgDiv.innerHTML = "Erro de conexão.";
        } finally {
            inputField.disabled = false;
            sendBtn.disabled = false;
            inputField.focus();
        }
    }

    function appendMsg(role, text) {
        const chatContainer = document.getElementById('chat-container');
        const msgDiv = document.createElement('div');
        msgDiv.className = `message ${role === 'user' ? 'user-message' : 'am-message'}`;
        msgDiv.innerHTML = text; 
        chatContainer.appendChild(msgDiv);
        chatContainer.scrollTop = chatContainer.scrollHeight;
        return msgDiv;
    }

    document.getElementById('userInput').addEventListener('keypress', (e) => {
        if (e.key === 'Enter') sendMessage();
    });
</script>
</body>
</html>
