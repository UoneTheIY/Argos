<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Argos Ia</title>
    <style>
        body { font-family: sans-serif; background: #121212; color: white; display: flex; flex-direction: column; height: 100vh; margin: 0; }
        #chat-box { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 10px; }
        .msg { padding: 12px; border-radius: 8px; max-width: 85%; word-wrap: break-word; }
        .user { background: #34495e; align-self: flex-end; }
        .ia { background: #1e272e; border: 1px solid #27ae60; align-self: flex-start; }
        .input-area { padding: 20px; background: #1e1e1e; display: flex; gap: 10px; border-top: 1px solid #333; }
        input { flex: 1; padding: 12px; border-radius: 5px; border: none; background: #2c3e50; color: white; outline: none; }
        button { padding: 10px 20px; background: #27ae60; color: white; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

    <div id="chat-box">
        <div class="msg ia">Olá! Tudo bem?</div>
    </div>

    <div class="input-area">
        <input type="text" id="user-input" placeholder="Digite aqui..." onkeypress="if(event.key==='Enter') window.enviarMensagem()">
        <button onclick="window.enviarMensagem()">Enviar</button>
    </div>

    <script>
        // LISTA QUE GUARDA A MEMÓRIA DA CONVERSA
        let historico = [
            { role: "system", content: "Você é um assistente prestativo que memoriza instruções do usuário." }
        ];

        window.enviarMensagem = async function() {
            const API_KEY = "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"; 
            const input = document.getElementById('user-input');
            const chatBox = document.getElementById('chat-box');
            const textoUser = input.value.trim();
            
            if (!textoUser) return;

            input.value = "";

            // 1. Adiciona a pergunta do usuário no Chat (Visual)
            const userDiv = document.createElement('div');
            userDiv.className = 'msg user';
            userDiv.innerText = textoUser;
            chatBox.appendChild(userDiv);

            // 2. SALVA NA MEMÓRIA (Histórico)
            historico.push({ role: "user", content: textoUser });

            try {
                const response = await fetch("https://corsproxy.io/?https://api.groq.com/openai/v1/chat/completions", {
                    method: "POST",
                    headers: {
                        "Authorization": `Bearer ${API_KEY}`,
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({
                        model: "llama 3.3 70b",
                        messages: historico, // ENVIANDO TODO O HISTÓRICO
                        temperature: 0.3 // Menor temperatura faz ela ser mais objetiva
                    })
                });

                const data = await response.json();
                const respostaIA = data.choices[0].message.content;

                // 3. SALVA A RESPOSTA DA IA NA MEMÓRIA TAMBÉM
                historico.push({ role: "assistant", content: respostaIA });

                // 4. Mostra a resposta no Chat (Visual)
                const iaDiv = document.createElement('div');
                iaDiv.className = 'msg ia';
                iaDiv.innerText = respostaIA;
                chatBox.appendChild(iaDiv);
                
                chatBox.scrollTop = chatBox.scrollHeight;

            } catch (e) {
                console.error(e);
                alert("Erro na conexão!");
            }
        };
    </script>
</body>
</html>
