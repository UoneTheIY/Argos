<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Uone AI Pro</title>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="config.js"></script>
    <style>
        :root { --bg: #0d1117; --accent: #238636; --text: #c9d1d9; }
        body { background: var(--bg); color: var(--text); font-family: sans-serif; margin: 0; display: flex; flex-direction: column; height: 100vh; }
        #chat { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px; }
        .msg { padding: 12px; border-radius: 15px; max-width: 80%; line-height: 1.5; }
        .user { align-self: flex-end; background: var(--accent); color: white; }
        .ai { align-self: flex-start; background: #21262d; border: 1px solid #333; }
        #input-area { padding: 15px; background: #161b22; display: flex; gap: 10px; border-top: 1px solid #333; }
        input { flex: 1; padding: 12px; border-radius: 20px; border: 1px solid #333; background: #0d1117; color: white; outline: none; }
        button { background: var(--accent); color: white; border: none; padding: 10px 20px; border-radius: 20px; font-weight: bold; }
        pre { background: #000; padding: 10px; border-radius: 8px; overflow-x: auto; }
    </style>
</head>
<body>

    <div id="chat"></div>

    <div id="input-area">
        <input type="text" id="user-input" placeholder="Pergunte algo...">
        <button id="btn" onclick="enviar()">Enviar</button>
    </div>

    <script>
        const chatDiv = document.getElementById('chat');

        // Carrega o histórico na tela ao abrir
        historico.forEach(m => {
            if(m.role !== 'system') add(m.content, m.role === 'user' ? 'user' : 'ai');
        });

        async function enviar() {
            const input = document.getElementById('user-input');
            const texto = input.value.trim();
            if(!texto) return;

            add(texto, 'user');
            input.value = '';
            
            const msgIA = add('Pensando...', 'ai');
            
            // Chama a função que está no config.js
            const resposta = await chamarIA(texto);
            msgIA.innerHTML = marked.parse(resposta);
            chatDiv.scrollTop = chatDiv.scrollHeight;
        }

        function add(txt, tipo) {
            const div = document.createElement('div');
            div.className = `msg ${tipo}`;
            div.innerHTML = (tipo === 'ai') ? marked.parse(txt) : txt;
            chatDiv.appendChild(div);
            chatDiv.scrollTop = chatDiv.scrollHeight;
            return div;
        }
    </script>
</body>
</html>
