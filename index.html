<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A.M</title>
    <style>
        :root {
            --bg: #0a0a0a;
            --panel: #161616;
            --accent: #00ffcc;
            --text: #e0e0e0;
            --user-msg: #1e3a8a;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Consolas', monospace;
            margin: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        header {
            background: var(--panel);
            padding: 15px;
            text-align: center;
            border-bottom: 2px solid var(--accent);
            text-transform: uppercase;
        }

        #chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            scroll-behavior: smooth;
        }

        .message {
            max-width: 85%;
            padding: 15px;
            border-radius: 5px;
            line-height: 1.6;
            word-wrap: break-word;
            white-space: pre-wrap; /* Preserva quebras de linha */
        }

        .user-message {
            align-self: flex-end;
            background-color: var(--user-msg);
            border-right: 4px solid #3b82f6;
        }

        .am-message {
            align-self: flex-start;
            background-color: var(--panel);
            border-left: 4px solid var(--accent);
        }

        .input-area {
            background: var(--panel);
            padding: 20px;
            display: flex;
            gap: 10px;
        }

        input {
            flex: 1;
            background: #222;
            border: 1px solid #444;
            padding: 15px;
            color: var(--accent);
            border-radius: 5px;
            outline: none;
        }

        button {
            background: var(--accent);
            color: black;
            border: none;
            padding: 0 25px;
            border-radius: 5px;
            font-weight: bold;
            cursor: pointer;
        }

        button:disabled { background: #444; cursor: not-allowed; }
    </style>
</head>
<body>

<header>
    <h1 style="margin:0; font-size: 1.2rem; letter-spacing: 3px;">A.M. Core Interface</h1>
</header>

<div id="chat-container"></div>

<div class="input-area">
    <input type="text" id="userInput" placeholder="Ask A.M..." onkeypress="handleKeyPress(event)">
    <button id="sendBtn" onclick="sendMessage()">Send</button>
</div>

<script>
    const GROQ_API_KEY = "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"; 
    
    let messages = [
        { role: "system", content: "Você é a A.M. (Advanced Machine). Suas respostas são técnicas, frias e extremamente lógicas. Use Markdown se necessário." }
    ];

    async function sendMessage() {
        const inputField = document.getElementById('userInput');
        const sendBtn = document.getElementById('sendBtn');
        const text = inputField.value.trim();

        if (!text) return;

        // Bloquear input durante o processo
        inputField.value = '';
        inputField.disabled = true;
        sendBtn.disabled = true;

        appendMessage('user', text);
        messages.push({ role: "user", content: text });

        // Criar o container da resposta da A.M. vazio
        const amMsgDiv = appendMessage('am', "");
        
        // Fazer scroll para o início da mensagem da A.M.
        amMsgDiv.scrollIntoView({ behavior: 'smooth', block: 'start' });

        try {
            const response = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                method: "POST",
                headers: {
                    "Authorization": `Bearer ${GROQ_API_KEY}`,
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({
                    model: "llama-3.3-70b-versatile",
                    messages: messages,
                    temperature: 0.5,
                    stream: true // ATIVA O MODO DE DIGITAÇÃO
                })
            });

            const reader = response.body.getReader();
            const decoder = new TextDecoder();
            let fullText = "";

            while (true) {
                const { done, value } = await reader.read();
                if (done) break;

                const chunk = decoder.decode(value, { stream: true });
                const lines = chunk.split("\n");

                for (const line of lines) {
                    if (line.startsWith("data: ") && line !== "data: [DONE]") {
                        const json = JSON.parse(line.substring(6));
                        const content = json.choices[0].delta.content;
                        if (content) {
                            fullText += content;
                            amMsgDiv.innerText = fullText; // Atualiza o texto na tela aos poucos
                        }
                    }
                }
            }

            messages.push({ role: "assistant", content: fullText });

        } catch (error) {
            amMsgDiv.innerText = "ERRO DE PROTOCOLO: Falha na comunicação.";
            console.error(error);
        } finally {
            inputField.disabled = false;
            sendBtn.disabled = false;
            inputField.focus();
        }
    }

    function appendMessage(role, text) {
        const chatContainer = document.getElementById('chat-container');
        const msgDiv = document.createElement('div');
        msgDiv.className = `message ${role === 'user' ? 'user-message' : 'am-message'}`;
        msgDiv.innerText = text;
        chatContainer.appendChild(msgDiv);
        return msgDiv; // Retorna o elemento para podermos atualizar o texto depois
    }

    function handleKeyPress(e) {
        if (e.key === 'Enter') sendMessage();
    }
</script>

</body>
</html>
