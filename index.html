<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Argos AI</title>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        :root { --bg: #0d1117; --accent: #238636; --text: #c9d1d9; --bubble-ai: #161b22; --border: #30363d; --danger: #da3633; }
        body, html { background: var(--bg); color: var(--text); font-family: -apple-system, system-ui, sans-serif; margin: 0; padding: 0; height: 100dvh; overflow: hidden; display: flex; justify-content: center; }
        .container { display: flex; flex-direction: column; height: 100%; width: 100%; max-width: 500px; background: var(--bg); position: relative; }
        header { height: 60px; padding: 0 15px; background: #161b22; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; }
        header h1 { font-size: 17px; color: var(--accent); margin: 0; font-weight: 600; }
        header h1 span { color: #8b949e; font-size: 13px; font-weight: normal; }
        .btn-menu { background: none; border: none; color: #8b949e; font-size: 22px; cursor: pointer; padding: 5px; }
        .dropdown { position: absolute; right: 10px; top: 50px; background: #1c2128; border: 1px solid var(--border); border-radius: 10px; width: 160px; display: none; box-shadow: 0 10px 30px rgba(0,0,0,0.5); z-index: 100; }
        .dropdown button { width: 100%; padding: 14px; background: none; border: none; color: var(--text); text-align: left; cursor: pointer; font-size: 14px; }
        #chat { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 15px; position: relative; scroll-behavior: smooth; }
        #empty-state { position: absolute; top: 45%; left: 50%; transform: translate(-50%, -50%); text-align: center; width: 80%; pointer-events: none; }
        #empty-state h2 { font-size: 20px; margin: 0; color: white; text-transform: uppercase; }
        #empty-state .linha { width: 120px; height: 2px; background: var(--accent); margin: 10px auto; opacity: 0.7; }
        .msg { padding: 12px 16px; border-radius: 18px; max-width: 85%; font-size: 15px; line-height: 1.5; z-index: 2; overflow-wrap: break-word; }
        .user { align-self: flex-end; background: var(--accent); color: white; border-bottom-right-radius: 4px; }
        .ai { align-self: flex-start; background: var(--bubble-ai); border: 1px solid var(--border); border-bottom-left-radius: 4px; }
        #input-area { padding: 12px 15px; background: #161b22; display: flex; gap: 10px; border-top: 1px solid var(--border); align-items: center; padding-bottom: calc(12px + env(safe-area-inset-bottom)); }
        input { flex: 1; padding: 12px 18px; border-radius: 25px; border: 1px solid var(--border); background: #0d1117; color: white; outline: none; font-size: 16px; min-width: 0; }
        #btn-enviar { background: none; border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; color: var(--accent); padding: 5px; margin-right: 5px; flex-shrink: 0; }
        #btn-enviar svg { width: 28px; height: 28px; fill: currentColor; }
        #btn-enviar:disabled { opacity: 0.3; }
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); display: none; align-items: center; justify-content: center; z-index: 1000; padding: 20px; }
        .modal { background: #1c2128; padding: 25px; border-radius: 15px; width: 100%; max-width: 320px; text-align: center; border: 1px solid var(--border); }
        .modal-btns { display: flex; gap: 12px; justify-content: center; margin-top: 20px; }
        .modal-btns button { flex: 1; padding: 12px; border-radius: 8px; border: none; cursor: pointer; font-weight: bold; }
        .btn-sim { background: var(--danger); color: white; }
        .btn-nao { background: #30363d; color: var(--text); }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <h1>Argos Ai <span>(v2.1 Fix)</span></h1>
            <div class="menu-container">
                <button class="btn-menu" onclick="toggleMenu()">⋮</button>
                <div id="dropdown" class="dropdown">
                    <button onclick="abrirModal()">🗑️ Excluir Chat</button>
                </div>
            </div>
        </header>

        <div id="chat">
            <div id="empty-state">
                <h2>Olá, como devo te chamar?</h2>
                <div class="linha"></div>
            </div>
        </div>

        <div id="input-area">
            <input type="text" id="user-input" placeholder="Pergunte ao Argos..." autocomplete="off">
            <button id="btn-enviar" onclick="enviar()">
                <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"></path></svg>
            </button>
        </div>
    </div>

    <div id="modal-confirm" class="modal-overlay">
        <div class="modal">
            <p style="margin:0; font-size:16px;">Deletar este chat?</p>
            <div class="modal-btns">
                <button class="btn-nao" onclick="fecharModal()">Não</button>
                <button class="btn-sim" onclick="deletarChat()">Sim</button>
            </div>
        </div>
    </div>

    <script>
        const CONFIG = {
            API_KEY: "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",
            MODELO: "llama-3.3-70b-versatile",
            SYSTEM_PROMPT: "Seu nome é Argos, criado por Uone. Você é uma IA iniciante. Responda de forma clara, direta e use emojis se necessário."
        };

        let historico = JSON.parse(localStorage.getItem('argos_vFinal')) || [{ role: "system", content: CONFIG.SYSTEM_PROMPT }];

        const chatDiv = document.getElementById('chat');
        const emptyState = document.getElementById('empty-state');
        const input = document.getElementById('user-input');
        const btnEnviar = document.getElementById('btn-enviar');

        function init() {
            chatDiv.innerHTML = '';
            chatDiv.appendChild(emptyState);
            const msgsReais = historico.filter(m => m.role !== 'system');
            if (msgsReais.length > 0) {
                emptyState.style.display = 'none';
                msgsReais.forEach(m => renderMsg(m.content, m.role === 'user' ? 'user' : 'ai'));
            }
            scrollChat();
        }

        function toggleMenu() { document.getElementById('dropdown').style.display = document.getElementById('dropdown').style.display === 'block' ? 'none' : 'block'; }
        function abrirModal() { document.getElementById('modal-confirm').style.display = 'flex'; document.getElementById('dropdown').style.display = 'none'; }
        function fecharModal() { document.getElementById('modal-confirm').style.display = 'none'; }
        
        function deletarChat() { 
            localStorage.removeItem('argos_vFinal'); 
            historico = [{ role: "system", content: CONFIG.SYSTEM_PROMPT }]; 
            init(); 
            fecharModal();
            emptyState.style.display = 'block';
        }

        async function enviar() {
            const texto = input.value.trim();
            if(!texto || btnEnviar.disabled) return;

            emptyState.style.display = 'none';
            renderMsg(texto, 'user');
            input.value = '';
            btnEnviar.disabled = true;
            
            const msgIA = renderMsg('...', 'ai');
            
            // Filtro para garantir que o histórico enviado seja limpo e leve
            const contextoCurto = [
                historico[0], 
                ...historico.slice(-8), 
                { role: "user", content: texto }
            ];

            try {
                const res = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                    method: "POST",
                    headers: { 
                        "Authorization": `Bearer ${CONFIG.API_KEY}`, 
                        "Content-Type": "application/json; charset=UTF-8" 
                    },
                    body: JSON.stringify({ 
                        model: CONFIG.MODELO, 
                        messages: contextoCurto, 
                        temperature: 0.7,
                        max_tokens: 1024
                    })
                });

                if (!res.ok) {
                    const errorData = await res.json();
                    throw new Error(errorData.error?.message || "Erro na API");
                }

                const data = await res.json();
                const resposta = data.choices[0].message.content;
                
                historico.push({ role: "user", content: texto });
                historico.push({ role: "assistant", content: resposta });
                
                msgIA.innerHTML = marked.parse(resposta);
                localStorage.setItem('argos_vFinal', JSON.stringify(historico));
            } catch (e) {
                msgIA.innerText = "Ops! Tente novamente em instantes.";
                console.error("Erro Argos:", e);
            } finally {
                btnEnviar.disabled = false;
                scrollChat();
            }
        }

        function renderMsg(txt, tipo) {
            const div = document.createElement('div');
            div.className = `msg ${tipo}`;
            if (tipo === 'user') div.textContent = txt;
            else div.innerHTML = (txt === '...') ? txt : marked.parse(txt);
            chatDiv.appendChild(div);
            scrollChat();
            return div;
        }

        function scrollChat() { chatDiv.scrollTop = chatDiv.scrollHeight; }
        input.addEventListener("keypress", (e) => { if(e.key === "Enter") enviar(); });
        window.onclick = (e) => { if (!e.target.matches('.btn-menu')) document.getElementById('dropdown').style.display = 'none'; };
        window.onload = init;
    </script>
</body>
</html>
